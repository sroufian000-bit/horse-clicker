<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐴 Horse Clicker Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>🐴 Horse Clicker</h1>
            <p class="subtitle">Click the horse and buy upgrades!</p>
        </header>

        <!-- Stats Panel -->
        <div class="stats-panel">
            <div class="stat">
                <span class="stat-label">Points</span>
                <span class="stat-value" id="points">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Per Click</span>
                <span class="stat-value" id="perClick">1</span>
            </div>
            <div class="stat">
                <span class="stat-label">Total Earned</span>
                <span class="stat-value" id="totalEarned">0</span>
            </div>
            <div class="stat">
                <span class="stat-label">Total Clicks</span>
                <span class="stat-value" id="totalClicks">0</span>
            </div>
        </div>

        <!-- Main Game Area -->
        <div class="game-area">
            <!-- Horse Button -->
            <button class="horse-button" id="horseButton">
                <span class="horse-emoji">🐴</span>
            </button>
            <p class="click-text">Click the horse!</p>
        </div>

        <!-- Upgrades Panel -->
        <div class="upgrades-container">
            <h2 class="upgrades-title">⭐ Upgrades</h2>
            <div class="upgrades-grid" id="upgradesGrid">
                <!-- Upgrades will be generated by JavaScript -->
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>Your progress is automatically saved!</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
